version: "3.9"

services:

  backend:

    build:
      context: ./backend

    container_name: plant_backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    restart: always

  frontend:

    build:
      context: ./frontend

    container_name: plant_frontend

    ports:
      - "8501:8501"

    volumes:
      - ./frontend:/app

    depends_on:
      - backend

    restart: always